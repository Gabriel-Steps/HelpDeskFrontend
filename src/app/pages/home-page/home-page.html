<div class="div-container-page">
    <div class="div-container-apresentacao">
        <p>Seja Bem-vindo(a), <b>{{usuario.name}}!</b></p>
    </div>
    <div class="div-container-button-add">
        <div class="div-containter-btn">
            <app-button-component text="ADICIONAR" type="secondary" (onClick)="invertIsOpenModalCreateCalled()"/>
        </div>
    </div>
    <div class="div-container-calleds">
        @for( called of listCalleds; track called.id ){
            <app-card-called-component [calledModel]="called" [onTrigger]="getAllCalledsByUserId"/>
        }
    </div>
</div>

<app-modal-create-called-component [isOpen]="isOpenModalCreateCalled" [onClosedModal]="invertIsOpenModalCreateCalled" [confirmAction]="getAllCalledsByUserId"/>
